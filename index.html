<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3350; --accent: #5b8cff; --accent2: #7c3aed;
      --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
      --text: #e8eaf6; --muted: #6b7280; --label: #a0a8c0;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
    .subtitle { font-size: 0.8rem; color: var(--muted); margin-bottom: 28px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab { padding: 8px 18px; border: none; background: none; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; margin-bottom: -1px; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--label); }
    .panel { display: none; } .panel.active { display: block; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--label); margin-bottom: 14px; }
    .input-row { display: flex; gap: 8px; }
    input[type="text"], input[type="date"] { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.15s; color-scheme: dark; }
    input[type="text"]:focus, input[type="date"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    button { padding: 10px 18px; border-radius: 8px; border: none; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { background: #4a7aee; }
    .btn-danger { background: transparent; border: 1px solid var(--border); color: var(--red); padding: 4px 10px; font-size: 0.75rem; } .btn-danger:hover { background: #ef444422; border-color: var(--red); }
    .btn-success { background: var(--green); color: #fff; width: 100%; padding: 12px; font-size: 0.95rem; border-radius: 10px; margin-top: 12px; } .btn-success:hover { background: #16a34a; } .btn-success:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
    .name-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
    .name-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 0.88rem; }
    .name-item .num { color: var(--muted); font-size: 0.75rem; margin-right: 10px; min-width: 20px; }
    .name-item .name-text { flex: 1; }
    .session-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 0.78rem; color: var(--label); margin-bottom: 16px; }
    .session-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .check-list { display: flex; flex-direction: column; gap: 8px; }
    .check-item { display: flex; align-items: center; gap: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; cursor: pointer; transition: all 0.12s; user-select: none; }
    .check-item:hover { border-color: var(--accent); }
    .check-item.checked { border-color: var(--green); background: #22c55e11; }
    .checkbox { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; transition: all 0.12s; flex-shrink: 0; }
    .check-item.checked .checkbox { background: var(--green); border-color: var(--green); }
    .checkmark { display: none; color: #fff; font-size: 12px; font-weight: 700; }
    .check-item.checked .checkmark { display: block; }
    .results-session { margin-bottom: 20px; }
    .results-session-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .session-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
    .chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .absent-chip { display: inline-flex; align-items: center; gap: 5px; background: #ef444418; border: 1px solid #ef444440; border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; color: var(--red); }
    .present-chip { display: inline-flex; align-items: center; gap: 5px; background: #22c55e18; border: 1px solid #22c55e40; border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; color: var(--green); }
    .flag-card { background: #ef444414; border: 1px solid #ef444450; border-radius: 12px; padding: 16px; margin-top: 8px; }
    .flag-card-title { font-size: 0.85rem; font-weight: 700; color: var(--red); margin-bottom: 10px; }
    .flag-item { display: flex; align-items: flex-start; gap: 10px; background: #ef444410; border: 1px solid #ef444430; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; font-size: 0.82rem; }
    .flag-item-name { font-weight: 600; color: var(--red); }
    .flag-item-days { color: #fca5a5; font-size: 0.78rem; margin-top: 2px; }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    .empty { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 32px 0; }
    .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .stat-box { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
    .stat-num { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-size: 0.85rem; color: var(--text); z-index: 999; transition: transform 0.25s ease; white-space: nowrap; box-shadow: 0 8px 30px #00000066; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .all-present-note { font-size: 0.78rem; color: var(--muted); font-style: italic; }
    .date-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .date-row label { font-size: 0.8rem; color: var(--label); white-space: nowrap; }
  </style>
</head>
<body>

<h1>📋 MTO Attendance System</h1>
<p class="subtitle">Attendance tracker • flags 3 consecutive absences</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('enroll')">Enroll</button>
  <button class="tab" onclick="switchTab('attendance')">Attendance</button>
  <button class="tab" onclick="switchTab('results')">Results</button>
</div>

<!-- ENROLL -->
<div id="tab-enroll" class="panel active">
  <div class="card">
    <div class="card-title">Add Name</div>
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Enter full name..." onkeydown="if(event.key==='Enter')addName()" />
      <button class="btn-primary" onclick="addName()">Add</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Enrolled (<span id="enrollCount">0</span>)</div>
    <div class="name-list" id="nameList"><div class="empty">Wala pang naka-enroll.</div></div>
  </div>
</div>

<!-- ATTENDANCE -->
<div id="tab-attendance" class="panel">
  <div class="session-badge">
    <div class="dot"></div>
    <span id="sessionLabel">Session</span>
  </div>
  <div class="card">
    <div class="card-title">Petsa ng Attendance</div>
    <div class="date-row">
      <label for="attendanceDate">Date:</label>
      <input type="date" id="attendanceDate" />
    </div>
  </div>
  <div class="card">
    <div class="card-title">I-check ang mga Present</div>
    <div class="check-list" id="checkList"><div class="empty">Mag-enroll muna ng names.</div></div>
    <button class="btn-success" id="submitBtn" onclick="submitAttendance()" disabled>Submit Attendance</button>
  </div>
</div>

<!-- RESULTS -->
<div id="tab-results" class="panel">
  <div id="resultsContent"><div class="empty">Wala pang attendance.</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  let names = [];
  let sessions = []; // each = { date: 'YYYY-MM-DD', present: Set }

  function formatDate(dateStr) {
    if (!dateStr) return 'Unknown Date';
    const [y, m, d] = dateStr.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const dt = new Date(y, m - 1, d);
    return `${days[dt.getDay()]}, ${months[m-1]} ${parseInt(d)}, ${y}`;
  }

  function todayStr() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function loadData() {
    const savedNames = localStorage.getItem('attendanceNames');
    const savedSessions = localStorage.getItem('attendanceSessions');
    if (savedNames) names = JSON.parse(savedNames);
    if (savedSessions) {
      const parsed = JSON.parse(savedSessions);
      sessions = parsed.map(s => ({ date: s.date, present: new Set(s.present) }));
    }
    renderEnrollList();
    if (sessions.length > 0) renderResults();
  }

  function saveNames() { localStorage.setItem('attendanceNames', JSON.stringify(names)); }

  function saveSessions() {
    const toSave = sessions.map(s => ({ date: s.date, present: Array.from(s.present) }));
    localStorage.setItem('attendanceSessions', JSON.stringify(toSave));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['enroll','attendance','results'][i] === tab);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'attendance') renderCheckList();
    if (tab === 'results') renderResults();
  }

  function addName() {
    const input = document.getElementById('nameInput');
    const val = input.value.trim();
    if (!val) return;
    if (names.map(n => n.toLowerCase()).includes(val.toLowerCase())) {
      showToast('⚠️ Nandoon na ang pangalan!'); return;
    }
    names.push(val);
    input.value = '';
    saveNames();
    renderEnrollList();
    showToast('✅ "' + val + '" added');
  }

  function removeName(i) {
    const removed = names.splice(i, 1)[0];
    saveNames();
    renderEnrollList();
    showToast('🗑️ "' + removed + '" removed');
  }

  function renderEnrollList() {
    const list = document.getElementById('nameList');
    document.getElementById('enrollCount').textContent = names.length;
    if (!names.length) { list.innerHTML = '<div class="empty">Wala pang naka-enroll.</div>'; return; }
    list.innerHTML = names.map((n, i) => `
      <div class="name-item">
        <span class="num">${i+1}</span>
        <span class="name-text">${n}</span>
        <button class="btn-danger" onclick="removeName(${i})">Remove</button>
      </div>`).join('');
  }

  function sid(name) { return 'ci_' + name.replace(/[^a-zA-Z0-9]/g, '_'); }

  function renderCheckList() {
    const list = document.getElementById('checkList');
    const btn = document.getElementById('submitBtn');
    const dateInput = document.getElementById('attendanceDate');

    if (!dateInput.value) dateInput.value = todayStr();

    const selectedDate = dateInput.value;
    const alreadyRecorded = sessions.find(s => s.date === selectedDate);

    document.getElementById('sessionLabel').textContent = formatDate(selectedDate);

    if (!names.length) {
      list.innerHTML = '<div class="empty">Mag-enroll muna ng names.</div>';
      btn.disabled = true; return;
    }

    if (alreadyRecorded) {
      list.innerHTML = '<div class="empty">May naka-record na para sa date na ito.</div>';
      btn.disabled = true;
      btn.textContent = 'Date already recorded';
      return;
    }

    list.innerHTML = names.map(n => `
      <div class="check-item" id="${sid(n)}" onclick="this.classList.toggle('checked')">
        <div class="checkbox"><span class="checkmark">✓</span></div>
        <span>${n}</span>
      </div>`).join('');
    btn.disabled = false;
    btn.textContent = 'Submit Attendance — ' + formatDate(selectedDate);
  }

  function submitAttendance() {
    const dateInput = document.getElementById('attendanceDate');
    const selectedDate = dateInput.value || todayStr();

    if (sessions.find(s => s.date === selectedDate)) {
      showToast('⚠️ May naka-record na para sa date na ito!'); return;
    }

    const present = new Set();
    names.forEach(n => {
      if (document.getElementById(sid(n))?.classList.contains('checked')) present.add(n);
    });

    sessions.push({ date: selectedDate, present });
    sessions.sort((a, b) => a.date.localeCompare(b.date));
    saveSessions();
    showToast('✅ ' + formatDate(selectedDate) + ' saved! (' + present.size + ' present)');
    renderCheckList();
    renderResults();
  }

  // Returns flagged names with 3+ consecutive absences (by session order)
  function getConsecutiveAbsent() {
    if (sessions.length < 3) return [];
    const flagged = [];
    names.forEach(name => {
      let streak = [];
      let longestStreaks = [];
      sessions.forEach(s => {
        if (!s.present.has(name)) {
          streak.push(s.date);
        } else {
          if (streak.length >= 3) longestStreaks.push([...streak]);
          streak = [];
        }
      });
      if (streak.length >= 3) longestStreaks.push([...streak]);
      if (longestStreaks.length > 0) {
        let allWindows = [];
        longestStreaks.forEach(st => {
          for (let i = 0; i <= st.length - 3; i++) {
            allWindows.push(st.slice(i, i + 3));
          }
        });
        flagged.push({ name, windows: allWindows });
      }
    });
    return flagged;
  }

  function renderResults() {
    const container = document.getElementById('resultsContent');
    if (!sessions.length) { container.innerHTML = '<div class="empty">Wala pang attendance.</div>'; return; }

    const flagged = getConsecutiveAbsent();
    let html = '';

    html += `<div class="stats-row">
      <div class="stat-box"><div class="stat-num" style="color:var(--accent)">${sessions.length}</div><div class="stat-label">Days Recorded</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--green)">${names.length}</div><div class="stat-label">Enrolled</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--red)">${flagged.length}</div><div class="stat-label">Flagged</div></div>
    </div>`;

    if (flagged.length) {
      html += `<div class="flag-card"><div class="flag-card-title">🚨 3 Consecutive Absences Detected</div>`;
      flagged.forEach(f => {
        html += `<div class="flag-item"><div>
          <div class="flag-item-name">✗ ${f.name}</div>
          ${f.windows.map(w => `<div class="flag-item-days">Absent: ${w.map(formatDate).join(', ')}</div>`).join('')}
        </div></div>`;
      });
      html += `</div>`;
    } else if (sessions.length >= 3) {
      html += `<div style="background:#22c55e14;border:1px solid #22c55e40;border-radius:10px;padding:12px 16px;font-size:0.85rem;color:var(--green);margin-bottom:8px">
        ✅ Walang 3 consecutive absences so far.
      </div>`;
    }

    html += `<div class="divider"></div>`;

    sessions.forEach(s => {
      const absent = names.filter(n => !s.present.has(n));
      html += `<div class="results-session">
        <div class="results-session-header">
          <div class="session-label">${formatDate(s.date)}</div>
          <span style="font-size:0.75rem;color:var(--muted)">${s.present.size}/${names.length} present</span>
        </div>
        <div class="chips">`;
      names.forEach(n => {
        if (s.present.has(n)) html += `<span class="present-chip">✓ ${n}</span>`;
        else html += `<span class="absent-chip">✗ ${n}</span>`;
      });
      if (!names.length) html += `<span class="all-present-note">No names enrolled at this time.</span>`;
      html += `</div></div>`;
    });

    container.innerHTML = html;
  }

  // Re-render checklist when date changes
  document.addEventListener('DOMContentLoaded', () => {
    loadData();
    document.getElementById('attendanceDate').addEventListener('change', renderCheckList);
  });
</script>
</body>
</html>
