<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTO Attendance System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3350; --accent: #5b8cff; --accent2: #7c3aed;
      --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
      --text: #e8eaf6; --muted: #6b7280; --label: #a0a8c0;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
    .subtitle { font-size: 0.8rem; color: var(--muted); margin-bottom: 28px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab { padding: 8px 18px; border: none; background: none; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; margin-bottom: -1px; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--label); }
    .panel { display: none; } .panel.active { display: block; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--label); margin-bottom: 14px; }
    .input-row { display: flex; gap: 8px; }
    input[type="text"], input[type="date"] { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.15s; color-scheme: dark; }
    input[type="text"]:focus, input[type="date"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    button { padding: 10px 18px; border-radius: 8px; border: none; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { background: #4a7aee; }
    .btn-danger { background: transparent; border: 1px solid var(--border); color: var(--red); padding: 4px 10px; font-size: 0.75rem; } .btn-danger:hover { background: #ef444422; border-color: var(--red); }
    .btn-success { background: var(--green); color: #fff; width: 100%; padding: 12px; font-size: 0.95rem; border-radius: 10px; margin-top: 12px; } .btn-success:hover { background: #16a34a; } .btn-success:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
    .btn-edit { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 6px 14px; font-size: 0.8rem; border-radius: 6px; } .btn-edit:hover { background: #5b8cff22; }
    .btn-update { background: var(--accent); color: #fff; width: 100%; padding: 12px; font-size: 0.95rem; border-radius: 10px; margin-top: 12px; } .btn-update:hover { background: #4a7aee; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 100%; padding: 10px; font-size: 0.85rem; border-radius: 10px; margin-top: 8px; } .btn-cancel:hover { background: var(--surface2); }
    .name-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
    .name-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 0.88rem; }
    .name-item .num { color: var(--muted); font-size: 0.75rem; margin-right: 10px; min-width: 20px; }
    .name-item .name-text { flex: 1; }
    .session-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 0.78rem; color: var(--label); margin-bottom: 16px; }
    .session-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .check-list { display: flex; flex-direction: column; gap: 8px; }
    .check-item { display: flex; align-items: center; gap: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; cursor: pointer; transition: all 0.12s; user-select: none; }
    .check-item:hover { border-color: var(--accent); }
    .check-item.checked { border-color: var(--green); background: #22c55e11; }
    .checkbox { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; transition: all 0.12s; flex-shrink: 0; }
    .check-item.checked .checkbox { background: var(--green); border-color: var(--green); }
    .checkmark { display: none; color: #fff; font-size: 12px; font-weight: 700; }
    .check-item.checked .checkmark { display: block; }
    .check-item.hidden { display: none; }
    .results-session { margin-bottom: 20px; }
    .results-session-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .session-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
    .chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .absent-chip { display: inline-flex; align-items: center; gap: 5px; background: #ef444418; border: 1px solid #ef444440; border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; color: var(--red); }
    .present-chip { display: inline-flex; align-items: center; gap: 5px; background: #22c55e18; border: 1px solid #22c55e40; border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; color: var(--green); }
    .flag-card { background: #ef444414; border: 1px solid #ef444450; border-radius: 12px; padding: 16px; margin-top: 8px; }
    .flag-card-title { font-size: 0.85rem; font-weight: 700; color: var(--red); margin-bottom: 10px; }
    .flag-item { display: flex; align-items: flex-start; gap: 10px; background: #ef444410; border: 1px solid #ef444430; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; font-size: 0.82rem; }
    .flag-item-name { font-weight: 600; color: var(--red); }
    .flag-item-days { color: #fca5a5; font-size: 0.78rem; margin-top: 2px; }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    .empty { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 32px 0; }
    .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .stat-box { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
    .stat-num { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-size: 0.85rem; color: var(--text); z-index: 999; transition: transform 0.25s ease; white-space: nowrap; box-shadow: 0 8px 30px #00000066; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .date-row { display: flex; gap: 8px; align-items: center; margin-bottom: 0; }
    .date-row label { font-size: 0.8rem; color: var(--label); white-space: nowrap; }
    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-wrap input { width: 100%; padding-left: 36px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; pointer-events: none; }
    .search-count { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; }
    .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 9999; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.85rem; color: var(--muted); }
    .sync-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--green); background: #22c55e18; border: 1px solid #22c55e40; border-radius: 20px; padding: 3px 10px; margin-left: 8px; }
    .recorded-notice { display: flex; align-items: center; justify-content: space-between; background: #22c55e10; border: 1px solid #22c55e40; border-radius: 10px; padding: 12px 14px; margin-bottom: 4px; }
    .recorded-notice-text { font-size: 0.83rem; color: var(--green); font-weight: 500; }
    .recorded-notice-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .edit-mode-banner { background: #5b8cff18; border: 1px solid #5b8cff50; border-radius: 10px; padding: 10px 14px; font-size: 0.82rem; color: var(--accent); margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text"></div>
</div>

<h1>📋 MTO Attendance System</h1>
<p class="subtitle">Attendance tracker • flags 3 consecutive absences </p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('enroll')">Enroll</button>
  <button class="tab" onclick="switchTab('attendance')">Attendance</button>
  <button class="tab" onclick="switchTab('results')">Results</button>
</div>

<!-- ENROLL -->
<div id="tab-enroll" class="panel active">
  <div class="card">
    <div class="card-title">Add Name</div>
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Enter Full Name" onkeydown="if(event.key==='Enter')addName()" />
      <button class="btn-primary" onclick="addName()">Add</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Enrolled (<span id="enrollCount">0</span>)</div>
    <div class="name-list" id="nameList"><div class="empty">Empty.</div></div>
  </div>
</div>

<!-- ATTENDANCE -->
<div id="tab-attendance" class="panel">
  <div class="session-badge">
    <div class="dot"></div>
    <span id="sessionLabel">Session</span>
  </div>
  <div class="card">
    <div class="card-title">Date of Attendance</div>
    <div class="date-row">
      <label for="attendanceDate">Date:</label>
      <input type="date" id="attendanceDate" />
    </div>
  </div>
  <div class="card">
    <div class="card-title">Check the names of Presents</div>

    <!-- Shown when recorded & NOT in edit mode -->
    <div id="recordedNotice" style="display:none">
      <div class="recorded-notice">
        <div>
          <div class="recorded-notice-text">✅ Attendance already recorded.</div>
          
        </div>
        <button class="btn-edit" onclick="enterEditMode()">Edit</button>
      </div>
    </div>

    <!-- Shown when in edit mode -->
    <div id="editModeBanner" style="display:none" class="edit-mode-banner">
      ✏️ Edit mode — make changes then click Save Changes.
    </div>

    <!-- Search (hidden when recorded & not editing) -->
    <div class="search-wrap" id="searchWrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="attendanceSearch" placeholder="Search" oninput="filterCheckList()" />
    </div>
    <div class="search-count" id="searchCount"></div>

    <div class="check-list" id="checkList"><div class="empty">Enroll Name First.</div></div>

    <button class="btn-success" id="submitBtn" onclick="submitAttendance()" disabled>Submit Attendance</button>
    <button class="btn-update" id="updateBtn" onclick="updateAttendance()" style="display:none">💾 Save Changes</button>
    <button class="btn-cancel" id="cancelBtn" onclick="cancelEditMode()" style="display:none">Cancel</button>
  </div>
</div>

<!-- RESULTS -->
<div id="tab-results" class="panel">
  <div id="resultsContent"><div class="empty">No attendance yet.</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDxnrUyzFXGjTSAB3_f03BFVni8GUJIbmY",
    authDomain: "mto-attendance.firebaseapp.com",
    projectId: "mto-attendance",
    storageBucket: "mto-attendance.firebasestorage.app",
    messagingSenderId: "854890145732",
    appId: "1:854890145732:web:2d2ec405ccd5749d332691"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let names = [];
  let sessions = [];
  let editMode = false;

  // ── Helpers ──────────────────────────────────────────
  function formatDate(dateStr) {
    if (!dateStr) return 'Unknown Date';
    const [y, m, d] = dateStr.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const dt = new Date(y, m - 1, d);
    return `${days[dt.getDay()]}, ${months[m-1]} ${parseInt(d)}, ${y}`;
  }

  function todayStr() {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  function sid(name) { return 'ci_' + name.replace(/[^a-zA-Z0-9]/g, '_'); }

  // ── Firebase ─────────────────────────────────────────
  async function saveNames() {
    await setDoc(doc(db, 'attendance', 'names'), { list: names });
  }

  async function saveSession(dateStr, presentSet) {
    await setDoc(doc(db, 'sessions', dateStr), { present: Array.from(presentSet) });
  }

  function startListeners() {
    onSnapshot(doc(db, 'attendance', 'names'), snap => {
      names = snap.exists() ? (snap.data().list || []) : [];
      renderEnrollList();
      renderCheckList();
    });
    onSnapshot(collection(db, 'sessions'), snap => {
      sessions = snap.docs.map(d => ({ date: d.id, present: new Set(d.data().present || []) }));
      sessions.sort((a, b) => a.date.localeCompare(b.date));
      renderResults();
      if (!editMode) renderCheckList();
      document.getElementById('loadingOverlay').style.display = 'none';
    });
  }

  // ── Tabs ─────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['enroll','attendance','results'][i] === tab);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'attendance') {
      editMode = false;
      document.getElementById('attendanceSearch').value = '';
      document.getElementById('searchCount').textContent = '';
      renderCheckList();
    }
    if (tab === 'results') renderResults();
  }
  window.switchTab = switchTab;

  // ── Enroll ────────────────────────────────────────────
  async function addName() {
    const input = document.getElementById('nameInput');
    const val = input.value.trim();
    if (!val) return;
    if (names.map(n => n.toLowerCase()).includes(val.toLowerCase())) {
      showToast('⚠️ Name already exists!'); return;
    }
    names.push(val);
    input.value = '';
    await saveNames();
    showToast('✅ "' + val + '" added');
  }
  window.addName = addName;

  async function removeName(i) {
    const removed = names.splice(i, 1)[0];
    await saveNames();
    showToast('🗑️ "' + removed + '" removed');
  }
  window.removeName = removeName;

  function renderEnrollList() {
    const list = document.getElementById('nameList');
    document.getElementById('enrollCount').textContent = names.length;
    if (!names.length) { list.innerHTML = '<div class="empty">Empty.</div>'; return; }
    list.innerHTML = names.map((n, i) => `
      <div class="name-item">
        <span class="num">${i+1}</span>
        <span class="name-text">${n}</span>
        <button class="btn-danger" onclick="removeName(${i})">Remove</button>
      </div>`).join('');
  }

  // ── Search ────────────────────────────────────────────
  function filterCheckList() {
    const query = document.getElementById('attendanceSearch').value.trim().toLowerCase();
    const items = document.querySelectorAll('#checkList .check-item');
    let visible = 0;
    items.forEach(item => {
      const nameEl = item.querySelector('.check-name');
      const name = nameEl ? nameEl.textContent.toLowerCase() : '';
      const match = name.includes(query);
      item.classList.toggle('hidden', !match);
      if (match) visible++;
    });
    document.getElementById('searchCount').textContent = query ? `${visible} result${visible !== 1 ? 's' : ''} found` : '';
  }
  window.filterCheckList = filterCheckList;

  // ── Edit mode ─────────────────────────────────────────
  function enterEditMode() {
    editMode = true;
    renderCheckList();
  }
  window.enterEditMode = enterEditMode;

  function cancelEditMode() {
    editMode = false;
    document.getElementById('attendanceSearch').value = '';
    document.getElementById('searchCount').textContent = '';
    renderCheckList();
  }
  window.cancelEditMode = cancelEditMode;

  // ── Render checklist ──────────────────────────────────
  function renderCheckList() {
    const list = document.getElementById('checkList');
    const submitBtn = document.getElementById('submitBtn');
    const updateBtn = document.getElementById('updateBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const recordedNotice = document.getElementById('recordedNotice');
    const editBanner = document.getElementById('editModeBanner');
    const searchWrap = document.getElementById('searchWrap');
    const dateInput = document.getElementById('attendanceDate');

    if (!dateInput.value) dateInput.value = todayStr();
    const selectedDate = dateInput.value;
    const recorded = sessions.find(s => s.date === selectedDate);

    document.getElementById('sessionLabel').textContent = formatDate(selectedDate);

    // Reset all UI
    recordedNotice.style.display = 'none';
    editBanner.style.display = 'none';
    submitBtn.style.display = 'none';
    updateBtn.style.display = 'none';
    cancelBtn.style.display = 'none';
    searchWrap.style.display = 'none';
    list.innerHTML = '';

    if (!names.length) {
      list.innerHTML = '<div class="empty">Enroll Name First.</div>';
      return;
    }

    // ── Case 1: Date already recorded, NOT editing ────
    if (recorded && !editMode) {
      recordedNotice.style.display = 'block';
      // Names are hidden — just show the notice, no list
      return;
    }

    // ── Case 2: Edit mode ─────────────────────────────
    if (recorded && editMode) {
      editBanner.style.display = 'block';
      searchWrap.style.display = 'block';
      updateBtn.style.display = 'block';
      cancelBtn.style.display = 'block';

      list.innerHTML = names.map(n => {
        const isPresent = recorded.present.has(n);
        return `
          <div class="check-item ${isPresent ? 'checked' : ''}" id="${sid(n)}" onclick="this.classList.toggle('checked')">
            <div class="checkbox"><span class="checkmark">✓</span></div>
            <span class="check-name">${n}</span>
          </div>`;
      }).join('');

      if (document.getElementById('attendanceSearch').value.trim()) filterCheckList();
      return;
    }

    // ── Case 3: Fresh date ────────────────────────────
    searchWrap.style.display = 'block';
    submitBtn.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Attendance — ' + formatDate(selectedDate);

    list.innerHTML = names.map(n => `
      <div class="check-item" id="${sid(n)}" onclick="this.classList.toggle('checked')">
        <div class="checkbox"><span class="checkmark">✓</span></div>
        <span class="check-name">${n}</span>
      </div>`).join('');

    if (document.getElementById('attendanceSearch').value.trim()) filterCheckList();
  }

  // ── Submit ────────────────────────────────────────────
  async function submitAttendance() {
    const selectedDate = document.getElementById('attendanceDate').value || todayStr();
    if (sessions.find(s => s.date === selectedDate)) { showToast('⚠️ Already recorded!'); return; }
    const present = new Set();
    names.forEach(n => { if (document.getElementById(sid(n))?.classList.contains('checked')) present.add(n); });
    await saveSession(selectedDate, present);
    showToast('✅ ' + formatDate(selectedDate) + ' saved! (' + present.size + ' present)');
    document.getElementById('attendanceSearch').value = '';
    document.getElementById('searchCount').textContent = '';
    editMode = false;
  }
  window.submitAttendance = submitAttendance;

  // ── Update ────────────────────────────────────────────
  async function updateAttendance() {
    const selectedDate = document.getElementById('attendanceDate').value || todayStr();
    const present = new Set();
    names.forEach(n => { if (document.getElementById(sid(n))?.classList.contains('checked')) present.add(n); });
    await saveSession(selectedDate, present);
    showToast('✅ ' + formatDate(selectedDate) + ' updated! (' + present.size + ' present)');
    document.getElementById('attendanceSearch').value = '';
    document.getElementById('searchCount').textContent = '';
    editMode = false;
    renderCheckList();
  }
  window.updateAttendance = updateAttendance;

  // ── Results ───────────────────────────────────────────
  function getConsecutiveAbsent() {
    if (sessions.length < 3) return [];
    const flagged = [];
    names.forEach(name => {
      let streak = [], longestStreaks = [];
      sessions.forEach(s => {
        if (!s.present.has(name)) { streak.push(s.date); }
        else { if (streak.length >= 3) longestStreaks.push([...streak]); streak = []; }
      });
      if (streak.length >= 3) longestStreaks.push([...streak]);
      if (longestStreaks.length > 0) {
        let allWindows = [];
        longestStreaks.forEach(st => { for (let i = 0; i <= st.length-3; i++) allWindows.push(st.slice(i,i+3)); });
        flagged.push({ name, windows: allWindows });
      }
    });
    return flagged;
  }

  function renderResults() {
    const container = document.getElementById('resultsContent');
    if (!sessions.length) { container.innerHTML = '<div class="empty">No attendance yet.</div>'; return; }
    const flagged = getConsecutiveAbsent();
    let html = `<div class="stats-row">
      <div class="stat-box"><div class="stat-num" style="color:var(--accent)">${sessions.length}</div><div class="stat-label">Days Recorded</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--green)">${names.length}</div><div class="stat-label">Enrolled</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--red)">${flagged.length}</div><div class="stat-label">Flagged</div></div>
    </div>`;

    if (flagged.length) {
      html += `<div class="flag-card"><div class="flag-card-title">🚨 3 Consecutive Absences Detected</div>`;
      flagged.forEach(f => {
        html += `<div class="flag-item"><div><div class="flag-item-name">✗ ${f.name}</div>
          ${f.windows.map(w => `<div class="flag-item-days">Absent: ${w.map(formatDate).join(', ')}</div>`).join('')}
        </div></div>`;
      });
      html += `</div>`;
    } else if (sessions.length >= 3) {
      html += `<div style="background:#22c55e14;border:1px solid #22c55e40;border-radius:10px;padding:12px 16px;font-size:0.85rem;color:var(--green);margin-bottom:8px">✅ No 3 consecutive absences so far.</div>`;
    }

    html += `<div class="divider"></div>`;
    sessions.forEach(s => {
      html += `<div class="results-session">
        <div class="results-session-header">
          <div class="session-label">${formatDate(s.date)}</div>
          <span style="font-size:0.75rem;color:var(--muted)">${s.present.size}/${names.length} present</span>
        </div><div class="chips">`;
      names.forEach(n => {
        if (s.present.has(n)) html += `<span class="present-chip">✓ ${n}</span>`;
        else html += `<span class="absent-chip">✗ ${n}</span>`;
      });
      html += `</div></div>`;
    });
    container.innerHTML = html;
  }

  // ── Init ──────────────────────────────────────────────
  document.getElementById('attendanceDate').addEventListener('change', () => {
    editMode = false;
    document.getElementById('attendanceSearch').value = '';
    document.getElementById('searchCount').textContent = '';
    renderCheckList();
  });
  startListeners();
</script>
</body>
</html>
